<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APF Drone · Moving Obstacles</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        overflow: hidden;
        font-family: 'Share Tech Mono', monospace;
        color: #00ffe7;
        user-select: none;
    }

    #canvas-container {
        width: 100vw; height: 100vh;
        cursor: grab;
    }
    #canvas-container:active { cursor: grabbing; }

    /* Scanline overlay */
    #canvas-container::after {
        content: '';
        position: fixed; inset: 0;
        background: repeating-linear-gradient(to bottom,
            transparent 0px, transparent 3px,
            rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
        pointer-events: none;
        z-index: 10;
    }

    /* HUD Panel (top-left) */
    #hud {
        position: fixed; top: 24px; left: 24px; z-index: 20;
        background: rgba(0, 8, 20, 0.85);
        border: 1px solid rgba(0, 255, 231, 0.3);
        border-left: 3px solid #00ffe7;
        padding: 16px 20px;
        min-width: 240px;
        backdrop-filter: blur(8px);
    }
    #hud h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 11px; font-weight: 900;
        letter-spacing: 0.25em;
        color: #00ffe7;
        margin-bottom: 14px;
        text-transform: uppercase;
    }
    .hud-row {
        display: flex; justify-content: space-between; gap: 20px;
        font-size: 11px; margin-bottom: 6px; letter-spacing: 0.05em;
    }
    .hud-label { color: rgba(0, 255, 231, 0.5); }
    .hud-val { color: #fff; font-weight: bold; }
    .hud-divider {
        border: none;
        border-top: 1px solid rgba(0, 255, 231, 0.15);
        margin: 10px 0;
    }

    /* Progress bar */
    .progress-bar-bg {
        width: 100%; height: 4px;
        background: rgba(0, 255, 231, 0.1);
        border-radius: 2px;
        margin-top: 8px; overflow: hidden;
    }
    #progress-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #00ffe7, #00ff88);
        transition: width 0.1s;
        border-radius: 2px;
        box-shadow: 0 0 8px #00ffe7;
    }

    #status-text {
        font-family: 'Orbitron', sans-serif;
        font-size: 9px; letter-spacing: 0.15em;
        margin-top: 10px; color: #00ffe7;
    }
    #status-text.arrived { color: #00ff88; }
    #status-text.navigating { color: #ffcc00; }

    /* APF Forces (bottom-left) */
    #apf-panel {
        position: fixed; bottom: 80px; left: 24px; z-index: 20;
        background: rgba(0, 8, 20, 0.85);
        border: 1px solid rgba(0, 255, 231, 0.3);
        border-left: 3px solid rgba(0, 255, 231, 0.4);
        padding: 14px 18px;
        min-width: 200px;
        backdrop-filter: blur(8px);
    }
    #apf-panel h2 {
        font-family: 'Orbitron', sans-serif;
        font-size: 9px; letter-spacing: 0.2em;
        color: rgba(0, 255, 231, 0.6);
        margin-bottom: 10px;
    }
    .bar-row { margin: 6px 0; }
    .bar-label {
        font-size: 10px; color: rgba(0, 255, 231, 0.5);
        display: flex; justify-content: space-between;
        margin-bottom: 3px;
    }
    .bar-label span:last-child { color: #fff; }
    .bar-bg { height: 4px; background: rgba(0, 255, 231, 0.08); border-radius: 2px; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.1s; }

    /* Controls (bottom center) */
    #controls {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
        z-index: 20; display: flex; gap: 10px; align-items: center;
        background: rgba(0, 8, 20, 0.85);
        border: 1px solid rgba(0, 255, 231, 0.25);
        padding: 12px 20px;
        backdrop-filter: blur(8px);
    }
    .btn {
        font-family: 'Orbitron', sans-serif;
        font-size: 9px; font-weight: 700;
        letter-spacing: 0.2em; padding: 8px 18px;
        border: 1px solid rgba(0, 255, 231, 0.4);
        background: transparent; color: #00ffe7;
        cursor: pointer; text-transform: uppercase;
        transition: all 0.15s;
    }
    .btn:hover {
        background: rgba(0, 255, 231, 0.1);
        border-color: #00ffe7;
        box-shadow: 0 0 12px rgba(0, 255, 231, 0.3);
    }
    .btn.active {
        background: rgba(0, 255, 231, 0.15);
        border-color: #00ffe7;
        box-shadow: 0 0 16px rgba(0, 255, 231, 0.4);
    }
    .btn-reset { border-color: rgba(255, 80, 80, 0.4); color: #ff5555; }
    .btn-reset:hover {
        background: rgba(255, 80, 80, 0.1);
        border-color: #ff5555;
        box-shadow: 0 0 12px rgba(255, 80, 80, 0.3);
    }
    .speed-label {
        font-size: 10px; letter-spacing: 0.1em;
        color: rgba(0, 255, 231, 0.5); margin-left: 8px;
    }
    #speed-input {
        width: 80px; -webkit-appearance: none;
        height: 3px; background: rgba(0, 255, 231, 0.2);
        outline: none; cursor: pointer; border-radius: 2px;
    }
    #speed-input::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px; height: 12px;
        background: #00ffe7; border-radius: 50%;
        box-shadow: 0 0 8px #00ffe7;
    }

    /* Legend (top-right) */
    #legend {
        position: fixed; top: 24px; right: 24px; z-index: 20;
        background: rgba(0, 8, 20, 0.85);
        border: 1px solid rgba(0, 255, 231, 0.2);
        border-right: 3px solid rgba(0, 255, 231, 0.4);
        padding: 14px 18px;
        backdrop-filter: blur(8px);
        font-size: 10px; letter-spacing: 0.08em;
    }
    #legend h2 {
        font-family: 'Orbitron', sans-serif;
        font-size: 9px; letter-spacing: 0.2em;
        color: rgba(0, 255, 231, 0.6);
        margin-bottom: 10px;
    }
    .legend-row {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 6px; color: rgba(255, 255, 255, 0.7);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Hint */
    .hint {
        position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
        z-index: 20; font-size: 9px; letter-spacing: 0.12em;
        color: rgba(0, 255, 231, 0.35);
    }

    /* Goal overlay */
    #goal-overlay {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none; opacity: 0;
        transition: opacity 1.2s ease; z-index: 30;
    }
    #goal-overlay.visible { opacity: 1; }
    .goal-box { text-align: center; animation: goalPulse 2s ease-in-out infinite; }
    .goal-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 42px; font-weight: 900;
        letter-spacing: 8px; color: #00ff88;
        text-shadow: 0 0 40px #00ff88, 0 0 80px rgba(0,255,136,0.3);
        text-transform: uppercase;
    }
    .goal-sub {
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px; color: rgba(0, 255, 136, 0.6);
        letter-spacing: 4px; margin-top: 8px;
    }
    @keyframes goalPulse {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.04); }
    }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
    <h1>◈ APF Moving Obstacles</h1>
    <div class="hud-row"><span class="hud-label">STATUS</span><span class="hud-val" id="sStatus">STANDBY</span></div>
    <div class="hud-row"><span class="hud-label">POSITION</span><span class="hud-val" id="sPos">—</span></div>
    <div class="hud-row"><span class="hud-label">VELOCITY</span><span class="hud-val" id="sVel">—</span></div>
    <hr class="hud-divider">
    <div class="hud-row"><span class="hud-label">PATH LEN</span><span class="hud-val" id="sPath">0.00</span></div>
    <div class="hud-row"><span class="hud-label">NEAREST OBS</span><span class="hud-val" id="sObs">—</span></div>
    <div class="hud-row"><span class="hud-label">DIST TO GOAL</span><span class="hud-val" id="sDist">—</span></div>
    <div class="progress-bar-bg"><div id="progress-bar"></div></div>
    <div id="status-text">⬡ AWAITING LAUNCH</div>
</div>

<div id="apf-panel">
    <h2>APF FORCES</h2>
    <div class="bar-row">
        <div class="bar-label"><span>Attractive</span><span id="fAtt">0.00</span></div>
        <div class="bar-bg"><div class="bar-fill" id="bAtt" style="width:0%;background:#00ffe7"></div></div>
    </div>
    <div class="bar-row">
        <div class="bar-label"><span>Repulsive</span><span id="fRep">0.00</span></div>
        <div class="bar-bg"><div class="bar-fill" id="bRep" style="width:0%;background:#ff5555"></div></div>
    </div>
    <div class="bar-row">
        <div class="bar-label"><span>Net Force</span><span id="fNet">0.00</span></div>
        <div class="bar-bg"><div class="bar-fill" id="bNet" style="width:0%;background:#ffcc00"></div></div>
    </div>
</div>

<div id="legend">
    <h2>LEGEND</h2>
    <div class="legend-row"><div class="dot" style="background:#00ff88;box-shadow:0 0 6px #00ff88"></div> Start</div>
    <div class="legend-row"><div class="dot" style="background:#ff4444;box-shadow:0 0 6px #ff4444"></div> Goal</div>
    <div class="legend-row"><div class="dot" style="background:#ff3333;box-shadow:0 0 6px #ff3333"></div> Obstacles</div>
    <div class="legend-row"><div class="dot" style="background:rgba(0,200,255,0.5)"></div> APF Trail</div>
    <div class="legend-row"><div class="dot" style="background:#4488ff;box-shadow:0 0 6px #4488ff"></div> Drone</div>
</div>

<div id="controls">
    <button class="btn" id="btnStart">▶ LAUNCH</button>
    <button class="btn btn-reset" id="btnReset">↺ RESET</button>
    <span class="speed-label">SPEED</span>
    <input type="range" id="speed-input" min="0.5" max="5" step="0.1" value="1.0">
    <span class="speed-label" id="speed-val">1.0×</span>
</div>

<div class="hint">DRAG TO ORBIT · SCROLL TO ZOOM</div>

<div id="goal-overlay">
    <div class="goal-box">
        <div class="goal-title">GOAL REACHED</div>
        <div class="goal-sub">MISSION COMPLETE</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════
//  SCENE BOOTSTRAP
// ═══════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000408);
scene.fog = new THREE.FogExp2(0x000408, 0.018);

// Camera spherical state
let camState = { theta: Math.PI * 0.42, phi: Math.PI * 0.32, r: 26 };
const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 200);
updateCamera();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function updateCamera() {
  const { theta, phi, r } = camState;
  camera.position.set(
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(0, 0, 0);
}

// Speed multiplier
let speedMul = 1.0;
const speedInput = document.getElementById('speed-input');
const speedVal = document.getElementById('speed-val');
speedInput.addEventListener('input', () => {
  speedMul = parseFloat(speedInput.value);
  speedVal.textContent = speedMul.toFixed(1) + '×';
});

// ═══════════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x1a2a50, 1.2));

const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(8, 14, 6);
sun.castShadow = true;
scene.add(sun);

const bluePoint = new THREE.PointLight(0x3366ff, 2, 18);
bluePoint.position.set(-6, 5, -6);
scene.add(bluePoint);

const redPoint = new THREE.PointLight(0xff4433, 1, 12);
redPoint.position.set(6, -5, 6);
scene.add(redPoint);

// ═══════════════════════════════════════════════════
//  CUBE ENVIRONMENT
// ═══════════════════════════════════════════════════
const HALF = 5;
const CUBE = HALF * 2;

const edgeGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(CUBE, CUBE, CUBE));
const edgeMat = new THREE.LineBasicMaterial({ color: 0x1a3a6a, transparent: true, opacity: 0.9 });
scene.add(new THREE.LineSegments(edgeGeo, edgeMat));

function makeGridFace(pos, rotX, rotY, color, opacity) {
  const g = new THREE.GridHelper(CUBE, 8, color, color);
  g.position.copy(pos);
  if (rotX) g.rotation.x = rotX;
  if (rotY) g.rotation.y = rotY;
  g.material.transparent = true;
  g.material.opacity = opacity;
  scene.add(g);
}
makeGridFace(new THREE.Vector3(0, -HALF, 0), 0, 0, 0x112244, 0.4);
makeGridFace(new THREE.Vector3(0,  HALF, 0), 0, 0, 0x112244, 0.2);
makeGridFace(new THREE.Vector3(-HALF, 0, 0), Math.PI/2, Math.PI/2, 0x0d1e38, 0.15);
makeGridFace(new THREE.Vector3( HALF, 0, 0), Math.PI/2, Math.PI/2, 0x0d1e38, 0.15);
makeGridFace(new THREE.Vector3(0, 0, -HALF), Math.PI/2, 0, 0x0d1e38, 0.15);
makeGridFace(new THREE.Vector3(0, 0,  HALF), Math.PI/2, 0, 0x0d1e38, 0.15);

const cornerMat = new THREE.MeshBasicMaterial({ color: 0x1a3870 });
const cornerGeo = new THREE.SphereGeometry(0.07, 8, 8);
for (let x of [-HALF, HALF]) for (let y of [-HALF, HALF]) for (let z of [-HALF, HALF]) {
  const c = new THREE.Mesh(cornerGeo, cornerMat);
  c.position.set(x, y, z);
  scene.add(c);
}

// ═══════════════════════════════════════════════════
//  START & GOAL MARKERS
// ═══════════════════════════════════════════════════
const START = new THREE.Vector3(-HALF + 0.4, -HALF + 0.4, -HALF + 0.4);
const GOAL  = new THREE.Vector3( HALF - 0.4,  HALF - 0.4,  HALF - 0.4);
const DIAG  = START.distanceTo(GOAL);

function makeMarker(pos, color, emissive, size) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(size, 20, 20),
    new THREE.MeshPhongMaterial({ color, emissive, shininess: 80 })
  );
  m.position.copy(pos);
  scene.add(m);
  return m;
}

const startMarker = makeMarker(START, 0x44ff88, 0x1a7a3a, 0.22);
const goalMarker  = makeMarker(GOAL,  0xff4444, 0x992222, 0.28);

const ringGeos = [0.5, 0.75, 1.0].map(r => {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(r, 0.03, 8, 32),
    new THREE.MeshBasicMaterial({ color: 0xff5533, transparent: true, opacity: 0.5 })
  );
  ring.position.copy(GOAL);
  scene.add(ring);
  return ring;
});

const lineGeo = new THREE.BufferGeometry().setFromPoints([START, GOAL]);
const lineMat = new THREE.LineDashedMaterial({ color: 0x223a5a, dashSize: 0.3, gapSize: 0.3, transparent: true, opacity: 0.4 });
const diagLine = new THREE.Line(lineGeo, lineMat);
diagLine.computeLineDistances();
scene.add(diagLine);

// ═══════════════════════════════════════════════════
//  DRONE MESH
// ═══════════════════════════════════════════════════
const droneGroup = new THREE.Group();
const rotorMeshes = [];

(function buildDrone() {
  const hull = new THREE.Mesh(
    new THREE.BoxGeometry(0.44, 0.10, 0.44),
    new THREE.MeshPhongMaterial({ color: 0xdde8f5, emissive: 0x0a1020, shininess: 120 })
  );
  droneGroup.add(hull);

  const dome = new THREE.Mesh(
    new THREE.SphereGeometry(0.09, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshPhongMaterial({ color: 0x2288ff, emissive: 0x0a2266, shininess: 200 })
  );
  dome.position.y = 0.08;
  droneGroup.add(dome);

  const led = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0x00ffff })
  );
  led.position.y = -0.08;
  droneGroup.add(led);

  const dl = new THREE.PointLight(0x44ccff, 1.5, 2.5);
  droneGroup.add(dl);

  const ARM_LEN = 0.55;
  const armMat = new THREE.MeshPhongMaterial({ color: 0x8899aa, emissive: 0x050a10 });
  const hubMat = new THREE.MeshPhongMaterial({ color: 0x667788 });
  const diskMat = new THREE.MeshPhongMaterial({ color: 0x1a2030, transparent: true, opacity: 0.75, side: THREE.DoubleSide });

  [45, 135, 225, 315].forEach((deg, i) => {
    const rad = deg * Math.PI / 180;
    const dx = Math.cos(rad) * ARM_LEN;
    const dz = Math.sin(rad) * ARM_LEN;
    const dir = new THREE.Vector3(dx, 0, dz).normalize();

    const armCyl = new THREE.Mesh(
      new THREE.CylinderGeometry(0.022, 0.022, ARM_LEN * 1.95, 6), armMat
    );
    const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    armCyl.quaternion.copy(quat);
    armCyl.position.set(dx * 0.5, 0, dz * 0.5);
    droneGroup.add(armCyl);

    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.07, 8), hubMat);
    hub.position.set(dx, 0.06, dz);
    droneGroup.add(hub);

    const disk = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.24, 0.012, 16), diskMat);
    disk.position.set(dx, 0.09, dz);
    droneGroup.add(disk);
    rotorMeshes.push({ mesh: disk, dir: i % 2 === 0 ? 1 : -1 });

    [0, Math.PI/2].forEach(bRot => {
      const blade = new THREE.Mesh(
        new THREE.BoxGeometry(0.44, 0.008, 0.055),
        new THREE.MeshPhongMaterial({ color: 0x222830, transparent: true, opacity: 0.65 })
      );
      blade.position.set(dx, 0.095, dz);
      blade.rotation.y = bRot;
      droneGroup.add(blade);
      rotorMeshes.push({ mesh: blade, dir: i % 2 === 0 ? 1 : -1 });
    });
  });
})();

droneGroup.position.copy(START);
scene.add(droneGroup);

// ═══════════════════════════════════════════════════
//  OBSTACLES
// ═══════════════════════════════════════════════════
const NUM_OBS = 15;
const obstacles = [];

for (let i = 0; i < NUM_OBS; i++) {
  const rad = 0.35 + Math.random() * 0.32;
  const geo = new THREE.SphereGeometry(rad, 20, 20);
  const mat = new THREE.MeshPhongMaterial({
    color: 0xff3333, emissive: 0x330000, shininess: 80, transparent: true, opacity: 0.85
  });
  const mesh = new THREE.Mesh(geo, mat);

  const wireGeo = new THREE.SphereGeometry(rad * 1.02, 10, 10);
  const wireMat = new THREE.MeshBasicMaterial({ color: 0xff6666, wireframe: true, transparent: true, opacity: 0.3 });
  mesh.add(new THREE.Mesh(wireGeo, wireMat));

  let pos;
  let tries = 0;
  do {
    pos = new THREE.Vector3(
      (Math.random() - 0.5) * (CUBE - 1.8),
      (Math.random() - 0.5) * (CUBE - 1.8),
      (Math.random() - 0.5) * (CUBE - 1.8)
    );
    tries++;
  } while ((pos.distanceTo(START) < 2.5 || pos.distanceTo(GOAL) < 2.5) && tries < 50);

  mesh.position.copy(pos);
  scene.add(mesh);

  const speed = 0.012 + Math.random() * 0.02;
  const vel = new THREE.Vector3(
    Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5
  ).normalize().multiplyScalar(speed);

  obstacles.push({ mesh, vel, radius: rad });
}

// ═══════════════════════════════════════════════════
//  TRAIL
// ═══════════════════════════════════════════════════
const MAX_TRAIL = 600;
const trailPoints = [];
let trailGeo = new THREE.BufferGeometry();
const trailLine = new THREE.Line(
  trailGeo,
  new THREE.LineBasicMaterial({ color: 0x33aaff, transparent: true, opacity: 0.75 })
);
scene.add(trailLine);

// ═══════════════════════════════════════════════════
//  APF PARAMETERS
// ═══════════════════════════════════════════════════
const APF = {
  K_ATT:  2.5,
  D_STAR: 2.8,
  K_REP:  40.0,
  D0:     3.8,
  K_WALL: 14.0,
  D_WALL: 2.2,
  DT:     0.012,
  DAMP:   0.75,
  VMAX:   0.18,
};

// ═══════════════════════════════════════════════════
//  SIMULATION STATE
// ═══════════════════════════════════════════════════
let vel      = new THREE.Vector3();
let running  = false;
let reached  = false;
let pathLen  = 0;
let prevPos  = START.clone();
let stuckCtr = 0;
let frame    = 0;

let lastFatt = 0, lastFrep = 0, lastFnet = 0;

function computeAPF(pos) {
  const F = new THREE.Vector3();

  const toGoal = GOAL.clone().sub(pos);
  const dGoal = toGoal.length();
  const Fatt = dGoal < APF.D_STAR
    ? toGoal.clone().multiplyScalar(APF.K_ATT)
    : toGoal.clone().normalize().multiplyScalar(APF.K_ATT * APF.D_STAR);

  lastFatt = Fatt.length();
  F.add(Fatt);

  const Frep = new THREE.Vector3();
  for (const obs of obstacles) {
    const toObs = pos.clone().sub(obs.mesh.position);
    const raw = toObs.length();
    const d = Math.max(raw - obs.radius, 0.05);
    if (d < APF.D0) {
      const mag = APF.K_REP * (1/d - 1/APF.D0) / (d * d);
      Frep.add(toObs.clone().normalize().multiplyScalar(mag));
    }
  }
  lastFrep = Frep.length();
  F.add(Frep);

  const bound = HALF - 0.25;
  for (const ax of ['x','y','z']) {
    const p = pos[ax];
    const dPos = bound - p;
    if (dPos < APF.D_WALL && dPos > 0.001) {
      F[ax] -= APF.K_WALL * (1/dPos - 1/APF.D_WALL) / (dPos*dPos);
    }
    const dNeg = p + bound;
    if (dNeg < APF.D_WALL && dNeg > 0.001) {
      F[ax] += APF.K_WALL * (1/dNeg - 1/APF.D_WALL) / (dNeg*dNeg);
    }
  }

  lastFnet = F.length();
  return F;
}

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  frame++;

  ringGeos.forEach((r, i) => {
    const t = frame * 0.012 + i * Math.PI * 0.6;
    r.scale.setScalar(1 + Math.sin(t) * 0.12);
    r.material.opacity = 0.25 + Math.sin(t) * 0.2;
    r.rotation.x += 0.012 * (i + 1);
    r.rotation.y += 0.008 * (i + 1);
  });

  for (const obs of obstacles) {
    obs.mesh.position.add(obs.vel);
    obs.mesh.rotation.x += 0.008;
    obs.mesh.rotation.y += 0.013;
    for (const ax of ['x','y','z']) {
      const b = HALF - obs.radius;
      if (obs.mesh.position[ax] > b) { obs.vel[ax] *= -1; obs.mesh.position[ax] = b; }
      if (obs.mesh.position[ax] < -b) { obs.vel[ax] *= -1; obs.mesh.position[ax] = -b; }
    }
  }

  if (running && !reached) {
    const dt = APF.DT * speedMul;
    const pos = droneGroup.position;

    const force = computeAPF(pos);

    if (vel.length() < 0.004) {
      stuckCtr++;
      if (stuckCtr > 40) {
        force.add(new THREE.Vector3(
          (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8
        ));
        stuckCtr = 0;
      }
    } else { stuckCtr = 0; }

    vel.addScaledVector(force, dt);
    vel.multiplyScalar(APF.DAMP);
    vel.clampLength(0, APF.VMAX * speedMul);

    pos.add(vel);
    pos.clampScalar(-HALF + 0.18, HALF - 0.18);

    for (const obs of obstacles) {
      const diff = pos.clone().sub(obs.mesh.position);
      const minDist = obs.radius + 0.28;
      if (diff.length() < minDist) {
        pos.copy(obs.mesh.position).addScaledVector(diff.normalize(), minDist);
        vel.reflect(diff.normalize()).multiplyScalar(0.3);
      }
    }

    pathLen += pos.distanceTo(prevPos);
    prevPos.copy(pos.clone());
    trailPoints.push(pos.clone());
    if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
    if (trailPoints.length >= 2) trailGeo.setFromPoints(trailPoints);

    const tX = -vel.z * 4.5;
    const tZ = vel.x * 4.5;
    droneGroup.rotation.x += (tX - droneGroup.rotation.x) * 0.12;
    droneGroup.rotation.z += (tZ - droneGroup.rotation.z) * 0.12;
    if (vel.lengthSq() > 0.0001) {
      const yaw = Math.atan2(vel.x, vel.z);
      droneGroup.rotation.y += (yaw - droneGroup.rotation.y) * 0.08;
    }

    if (pos.distanceTo(GOAL) < 0.55) {
      reached = true;
      running = false;
      onGoalReached();
    }

    // HUD
    const nearest = obstacles.reduce((best, o) => {
      const d = pos.distanceTo(o.mesh.position) - o.radius;
      return d < best ? d : best;
    }, Infinity);

    document.getElementById('sPos').textContent =
      `${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)}`;
    document.getElementById('sVel').textContent = (vel.length() * 100).toFixed(1) + ' u/s';
    document.getElementById('sPath').textContent = pathLen.toFixed(2);
    document.getElementById('sObs').textContent = nearest.toFixed(2) + ' u';
    document.getElementById('sDist').textContent = pos.distanceTo(GOAL).toFixed(2) + ' u';

    // Progress bar
    const progress = Math.max(0, 1 - pos.distanceTo(GOAL) / DIAG) * 100;
    document.getElementById('progress-bar').style.width = progress + '%';

    const maxF = 8;
    document.getElementById('fAtt').textContent = lastFatt.toFixed(2);
    document.getElementById('bAtt').style.width = Math.min(lastFatt/maxF*100, 100) + '%';
    document.getElementById('fRep').textContent = lastFrep.toFixed(2);
    document.getElementById('bRep').style.width = Math.min(lastFrep/maxF*100, 100) + '%';
    document.getElementById('fNet').textContent = lastFnet.toFixed(2);
    document.getElementById('bNet').style.width = Math.min(lastFnet/maxF*100, 100) + '%';
  }

  const spinSpeed = running ? 0.28 : 0.06;
  for (const r of rotorMeshes) r.mesh.rotation.y += spinSpeed * r.dir;

  const sp = 1 + Math.sin(frame * 0.06) * 0.08;
  startMarker.scale.setScalar(sp);

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════
//  GOAL REACHED
// ═══════════════════════════════════════════════════
function onGoalReached() {
  document.getElementById('sStatus').textContent = 'ARRIVED';
  document.getElementById('sStatus').style.color = '#00ff88';
  document.getElementById('status-text').textContent = '⬡ MISSION COMPLETE';
  document.getElementById('status-text').className = 'arrived';
  document.getElementById('btnStart').textContent = '✓ DONE';
  document.getElementById('btnStart').disabled = true;
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('goal-overlay').classList.add('visible');
  setTimeout(() => {
    document.getElementById('goal-overlay').classList.remove('visible');
  }, 5000);
}

// ═══════════════════════════════════════════════════
//  CAMERA CONTROLS
// ═══════════════════════════════════════════════════
let dragging = false, lastM = {x:0,y:0};

renderer.domElement.addEventListener('mousedown', e => { dragging = true; lastM = {x:e.clientX,y:e.clientY}; });
window.addEventListener('mouseup', () => dragging = false);
renderer.domElement.addEventListener('mouseleave', () => dragging = false);
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  camState.theta -= (e.clientX - lastM.x) * 0.007;
  camState.phi = Math.max(0.06, Math.min(Math.PI - 0.06, camState.phi - (e.clientY - lastM.y) * 0.007));
  lastM = {x:e.clientX,y:e.clientY};
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e => {
  camState.r = Math.max(7, Math.min(55, camState.r + e.deltaY * 0.025));
  updateCamera();
  e.preventDefault();
}, { passive: false });

let lastTouch = null;
renderer.domElement.addEventListener('touchstart', e => { lastTouch = e.touches[0]; });
renderer.domElement.addEventListener('touchmove', e => {
  if (!lastTouch) return;
  const t = e.touches[0];
  camState.theta -= (t.clientX - lastTouch.clientX) * 0.007;
  camState.phi = Math.max(0.06, Math.min(Math.PI-0.06, camState.phi - (t.clientY - lastTouch.clientY) * 0.007));
  lastTouch = t;
  updateCamera();
  e.preventDefault();
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => lastTouch = null);

// ═══════════════════════════════════════════════════
//  BUTTONS
// ═══════════════════════════════════════════════════
const btnStart = document.getElementById('btnStart');
const btnReset = document.getElementById('btnReset');

btnStart.addEventListener('click', () => {
  if (reached) return;
  running = !running;
  if (running) {
    btnStart.textContent = '⏸ PAUSE';
    btnStart.classList.add('active');
    document.getElementById('sStatus').textContent = 'NAVIGATING';
    document.getElementById('sStatus').style.color = '#ffcc00';
    document.getElementById('status-text').textContent = '⬡ NAVIGATING...';
    document.getElementById('status-text').className = 'navigating';
  } else {
    btnStart.textContent = '▶ RESUME';
    btnStart.classList.remove('active');
    document.getElementById('sStatus').textContent = 'PAUSED';
    document.getElementById('sStatus').style.color = '#88a';
    document.getElementById('status-text').textContent = '⬡ PAUSED';
    document.getElementById('status-text').className = '';
  }
});

btnReset.addEventListener('click', () => {
  running = false;
  reached = false;
  vel.set(0, 0, 0);
  droneGroup.position.copy(START);
  droneGroup.rotation.set(0, 0, 0);
  trailPoints.length = 0;
  trailGeo = new THREE.BufferGeometry();
  trailLine.geometry = trailGeo;
  pathLen = 0;
  prevPos.copy(START);
  stuckCtr = 0;
  lastFatt = lastFrep = lastFnet = 0;

  btnStart.textContent = '▶ LAUNCH';
  btnStart.classList.remove('active');
  btnStart.disabled = false;
  document.getElementById('sStatus').textContent = 'STANDBY';
  document.getElementById('sStatus').style.color = '#00ffe7';
  document.getElementById('status-text').textContent = '⬡ AWAITING LAUNCH';
  document.getElementById('status-text').className = '';
  document.getElementById('sPos').textContent = '—';
  document.getElementById('sVel').textContent = '—';
  document.getElementById('sPath').textContent = '0.00';
  document.getElementById('sObs').textContent = '—';
  document.getElementById('sDist').textContent = '—';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('bAtt').style.width = '0%';
  document.getElementById('bRep').style.width = '0%';
  document.getElementById('bNet').style.width = '0%';
  document.getElementById('fAtt').textContent = '0.00';
  document.getElementById('fRep').textContent = '0.00';
  document.getElementById('fNet').textContent = '0.00';
  document.getElementById('goal-overlay').classList.remove('visible');
});

// ═══════════════════════════════════════════════════
//  KICK OFF
// ═══════════════════════════════════════════════════
animate();
</script>
