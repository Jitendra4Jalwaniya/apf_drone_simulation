<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APF Drone Sim</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:       #04060f;
    --panel-bg: rgba(6, 12, 30, 0.88);
    --border:   rgba(64, 140, 255, 0.25);
    --accent:   #3af;
    --accent2:  #4f8;
    --danger:   #f54;
    --text:     #b8ccee;
    --dim:      #556;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Exo 2', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: var(--sans);
    color: var(--text);
  }

  canvas { display: block; }

  /* ---- HUD ---- */
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .panel {
    pointer-events: all;
    position: absolute;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(40,100,255,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* Top-left: title + controls */
  #ctrl-panel {
    top: 20px; left: 20px;
    min-width: 230px;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 7px 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: rgba(40,80,180,0.2);
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    text-transform: uppercase;
  }
  .btn:hover { background: rgba(60,120,255,0.3); border-color: rgba(100,180,255,0.5); }
  .btn.go { background: rgba(20,180,80,0.2); border-color: rgba(60,220,120,0.4); color: var(--accent2); }
  .btn.go:hover { background: rgba(30,200,100,0.35); }
  .btn.go.active { background: rgba(200,80,20,0.2); border-color: rgba(255,120,60,0.4); color: var(--danger); }

  /* Stats */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid rgba(64,140,255,0.08);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono); }
  .stat-val { font-size: 12px; font-family: var(--mono); color: #cce; }
  .stat-val.accent { color: var(--accent); }
  .stat-val.good { color: var(--accent2); }
  .stat-val.warn { color: #fa4; }

  /* Bottom-right: legend */
  #legend-panel {
    bottom: 20px; right: 20px;
    min-width: 180px;
  }

  .legend-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; color: var(--text);
    padding: 3px 0;
    font-family: var(--mono);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Bottom-left: APF info */
  #apf-panel {
    bottom: 20px; left: 20px;
    min-width: 200px;
  }
  .bar-row { margin: 4px 0; }
  .bar-label { font-size: 10px; color: var(--dim); font-family: var(--mono); display: flex; justify-content: space-between; margin-bottom: 3px; }
  .bar-bg { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.1s; }

  /* Top-right: drag hint */
  #hint {
    top: 20px; right: 20px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    line-height: 1.8;
    padding: 10px 14px;
    pointer-events: none;
  }

  /* Goal overlay */
  #goal-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0; transition: opacity 1.2s ease;
    z-index: 20;
  }
  #goal-overlay.visible { opacity: 1; }
  .goal-box {
    text-align: center;
    animation: goalPulse 2s ease-in-out infinite;
  }
  .goal-title {
    font-family: var(--mono);
    font-size: 42px;
    letter-spacing: 8px;
    color: var(--accent2);
    text-shadow: 0 0 40px var(--accent2), 0 0 80px rgba(68,255,136,0.3);
    text-transform: uppercase;
  }
  .goal-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: rgba(100,220,150,0.6);
    letter-spacing: 4px;
    margin-top: 8px;
  }
  @keyframes goalPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  /* Scan line effect */
  #scanlines {
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    z-index: 5;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="scanlines"></div>

<div id="hud">

  <!-- Controls -->
  <div class="panel" id="ctrl-panel">
    <div class="panel-title">◈ APF Drone Navigation</div>
    <div class="btn-row">
      <button class="btn go" id="btnStart">▶ Launch</button>
      <button class="btn" id="btnReset">↺ Reset</button>
    </div>
    <div class="stat-row">
      <span class="stat-label">Status</span>
      <span class="stat-val accent" id="sStatus">STANDBY</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Position</span>
      <span class="stat-val" id="sPos">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Velocity</span>
      <span class="stat-val" id="sVel">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Path Len</span>
      <span class="stat-val" id="sPath">0.00</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Obstacles</span>
      <span class="stat-val warn" id="sObs">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">To Goal</span>
      <span class="stat-val" id="sDist">—</span>
    </div>
  </div>

  <!-- APF forces -->
  <div class="panel" id="apf-panel">
    <div class="panel-title">◈ APF Forces</div>
    <div class="bar-row">
      <div class="bar-label"><span>Attractive</span><span id="fAtt">0.00</span></div>
      <div class="bar-bg"><div class="bar-fill" id="bAtt" style="width:0%;background:#3af"></div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label"><span>Repulsive</span><span id="fRep">0.00</span></div>
      <div class="bar-bg"><div class="bar-fill" id="bRep" style="width:0%;background:#f54"></div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label"><span>Net Force</span><span id="fNet">0.00</span></div>
      <div class="bar-bg"><div class="bar-fill" id="bNet" style="width:0%;background:#fa4"></div></div>
    </div>
  </div>

  <!-- Legend -->
  <div class="panel" id="legend-panel">
    <div class="panel-title">◈ Legend</div>
    <div class="legend-item"><div class="dot" style="background:#4f8"></div> Start corner</div>
    <div class="legend-item"><div class="dot" style="background:#f54"></div> Goal corner</div>
    <div class="legend-item"><div class="dot" style="background:#fa4"></div> Obstacles</div>
    <div class="legend-item"><div class="dot" style="background:#3af"></div> Drone trail</div>
    <div class="legend-item"><div class="dot" style="background:#fff;opacity:0.6"></div> Drone</div>
  </div>

  <!-- Hint -->
  <div class="panel" id="hint">
    DRAG · ROTATE<br>
    SCROLL · ZOOM<br>
    TOUCH · SUPPORTED
  </div>

</div>

<!-- Goal overlay -->
<div id="goal-overlay">
  <div class="goal-box">
    <div class="goal-title">GOAL REACHED</div>
    <div class="goal-sub">MISSION COMPLETE</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════
//  SCENE BOOTSTRAP
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04060f);
scene.fog = new THREE.FogExp2(0x04060f, 0.018);

// Camera spherical state
let camState = { theta: Math.PI * 0.42, phi: Math.PI * 0.32, r: 26 };
const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 200);
updateCamera();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function updateCamera() {
  const { theta, phi, r } = camState;
  camera.position.set(
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(0, 0, 0);
}

// ═══════════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x1a2a50, 1.2));

const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(8, 14, 6);
sun.castShadow = true;
scene.add(sun);

const bluePoint = new THREE.PointLight(0x3366ff, 2, 18);
bluePoint.position.set(-6, 5, -6);
scene.add(bluePoint);

const redPoint = new THREE.PointLight(0xff4433, 1, 12);
redPoint.position.set(6, -5, 6);
scene.add(redPoint);

// ═══════════════════════════════════════════════════
//  CUBE ENVIRONMENT
// ═══════════════════════════════════════════════════
const HALF = 5;
const CUBE = HALF * 2;

// Outer wireframe cage
const edgeGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(CUBE, CUBE, CUBE));
const edgeMat = new THREE.LineBasicMaterial({ color: 0x1a3a6a, transparent: true, opacity: 0.9 });
scene.add(new THREE.LineSegments(edgeGeo, edgeMat));

// Interior grid faces (subtle)
function makeGridFace(pos, rotX, rotY, color, opacity) {
  const g = new THREE.GridHelper(CUBE, 8, color, color);
  g.position.copy(pos);
  if (rotX) g.rotation.x = rotX;
  if (rotY) g.rotation.y = rotY;
  g.material.transparent = true;
  g.material.opacity = opacity;
  scene.add(g);
}
makeGridFace(new THREE.Vector3(0, -HALF, 0), 0, 0, 0x112244, 0.4);    // bottom
makeGridFace(new THREE.Vector3(0,  HALF, 0), 0, 0, 0x112244, 0.2);    // top
makeGridFace(new THREE.Vector3(-HALF, 0, 0), Math.PI/2, Math.PI/2, 0x0d1e38, 0.15); // left
makeGridFace(new THREE.Vector3( HALF, 0, 0), Math.PI/2, Math.PI/2, 0x0d1e38, 0.15); // right
makeGridFace(new THREE.Vector3(0, 0, -HALF), Math.PI/2, 0, 0x0d1e38, 0.15); // back
makeGridFace(new THREE.Vector3(0, 0,  HALF), Math.PI/2, 0, 0x0d1e38, 0.15); // front

// Corner spheres
const cornerMat = new THREE.MeshBasicMaterial({ color: 0x1a3870 });
const cornerGeo = new THREE.SphereGeometry(0.07, 8, 8);
for (let x of [-HALF, HALF]) for (let y of [-HALF, HALF]) for (let z of [-HALF, HALF]) {
  const c = new THREE.Mesh(cornerGeo, cornerMat);
  c.position.set(x, y, z);
  scene.add(c);
}

// ═══════════════════════════════════════════════════
//  START & GOAL MARKERS
// ═══════════════════════════════════════════════════
const START = new THREE.Vector3(-HALF + 0.4, -HALF + 0.4, -HALF + 0.4);
const GOAL  = new THREE.Vector3( HALF - 0.4,  HALF - 0.4,  HALF - 0.4);

function makeMarker(pos, color, emissive, size) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(size, 20, 20),
    new THREE.MeshPhongMaterial({ color, emissive, shininess: 80 })
  );
  m.position.copy(pos);
  scene.add(m);
  return m;
}

const startMarker = makeMarker(START, 0x44ff88, 0x1a7a3a, 0.22);
const goalMarker  = makeMarker(GOAL,  0xff4444, 0x992222, 0.28);

// Goal rings (pulsing)
const ringGeos = [0.5, 0.75, 1.0].map(r => {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(r, 0.03, 8, 32),
    new THREE.MeshBasicMaterial({ color: 0xff5533, transparent: true, opacity: 0.5 })
  );
  ring.position.copy(GOAL);
  scene.add(ring);
  return ring;
});

// Straight-line reference
const lineGeo = new THREE.BufferGeometry().setFromPoints([START, GOAL]);
const lineMat = new THREE.LineDashedMaterial({ color: 0x223a5a, dashSize: 0.3, gapSize: 0.3, transparent: true, opacity: 0.4 });
const diagLine = new THREE.Line(lineGeo, lineMat);
diagLine.computeLineDistances();
scene.add(diagLine);

// ═══════════════════════════════════════════════════
//  DRONE MESH
// ═══════════════════════════════════════════════════
const droneGroup = new THREE.Group();
const rotorMeshes = [];

(function buildDrone() {
  // Body hull
  const hull = new THREE.Mesh(
    new THREE.BoxGeometry(0.44, 0.10, 0.44),
    new THREE.MeshPhongMaterial({ color: 0xdde8f5, emissive: 0x0a1020, shininess: 120 })
  );
  droneGroup.add(hull);

  // Top sensor dome
  const dome = new THREE.Mesh(
    new THREE.SphereGeometry(0.09, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshPhongMaterial({ color: 0x2288ff, emissive: 0x0a2266, shininess: 200 })
  );
  dome.position.y = 0.08;
  droneGroup.add(dome);

  // Bottom LED
  const led = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0x00ffff })
  );
  led.position.y = -0.08;
  droneGroup.add(led);

  // Drone point light
  const dl = new THREE.PointLight(0x44ccff, 1.5, 2.5);
  droneGroup.add(dl);

  // 4 arms + rotors at 45°, 135°, 225°, 315°
  const ARM_LEN = 0.55;
  const armMat = new THREE.MeshPhongMaterial({ color: 0x8899aa, emissive: 0x050a10 });
  const hubMat = new THREE.MeshPhongMaterial({ color: 0x667788 });
  const diskMat = new THREE.MeshPhongMaterial({ color: 0x1a2030, transparent: true, opacity: 0.75, side: THREE.DoubleSide });

  [45, 135, 225, 315].forEach((deg, i) => {
    const rad = deg * Math.PI / 180;
    const dx = Math.cos(rad) * ARM_LEN;
    const dz = Math.sin(rad) * ARM_LEN;
    const dir = new THREE.Vector3(dx, 0, dz).normalize();

    // Arm as thin cylinder
    const armCyl = new THREE.Mesh(
      new THREE.CylinderGeometry(0.022, 0.022, ARM_LEN * 1.95, 6),
      armMat
    );
    const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    armCyl.quaternion.copy(quat);
    armCyl.position.set(dx * 0.5, 0, dz * 0.5);
    droneGroup.add(armCyl);

    // Hub
    const hub = new THREE.Mesh(
      new THREE.CylinderGeometry(0.055, 0.055, 0.07, 8),
      hubMat
    );
    hub.position.set(dx, 0.06, dz);
    droneGroup.add(hub);

    // Rotor disk
    const disk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.24, 0.24, 0.012, 16),
      diskMat
    );
    disk.position.set(dx, 0.09, dz);
    droneGroup.add(disk);
    rotorMeshes.push({ mesh: disk, dir: i % 2 === 0 ? 1 : -1 });

    // Blade cross
    [0, Math.PI/2].forEach(bRot => {
      const blade = new THREE.Mesh(
        new THREE.BoxGeometry(0.44, 0.008, 0.055),
        new THREE.MeshPhongMaterial({ color: 0x222830, transparent: true, opacity: 0.65 })
      );
      blade.position.set(dx, 0.095, dz);
      blade.rotation.y = bRot;
      droneGroup.add(blade);
      rotorMeshes.push({ mesh: blade, dir: i % 2 === 0 ? 1 : -1 });
    });
  });
})();

droneGroup.position.copy(START);
scene.add(droneGroup);

// ═══════════════════════════════════════════════════
//  OBSTACLES
// ═══════════════════════════════════════════════════
const NUM_OBS = 9;
const obstacles = [];

const OBS_PALETTE = [
  { col: 0xff8833, em: 0x6a2800 },
  { col: 0xff3388, em: 0x6a0028 },
  { col: 0xffcc33, em: 0x6a4a00 },
  { col: 0xcc44ff, em: 0x440066 },
  { col: 0xff5555, em: 0x660010 },
  { col: 0x44ffcc, em: 0x006644 },
  { col: 0xff88cc, em: 0x660044 },
  { col: 0xaaff44, em: 0x3a6000 },
  { col: 0x55aaff, em: 0x003366 },
];

for (let i = 0; i < NUM_OBS; i++) {
  const rad = 0.35 + Math.random() * 0.32;
  const { col, em } = OBS_PALETTE[i % OBS_PALETTE.length];
  const geo = new THREE.SphereGeometry(rad, 18, 14);
  const mat = new THREE.MeshPhongMaterial({
    color: col, emissive: em,
    shininess: 60, transparent: true, opacity: 0.88
  });
  const mesh = new THREE.Mesh(geo, mat);

  // Wireframe shell
  const wf = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color: 0xffffff, wireframe: true, transparent: true, opacity: 0.08
  }));
  mesh.add(wf);

  // Point light aura
  const pl = new THREE.PointLight(col, 0.6, 2.5);
  mesh.add(pl);

  // Place away from start/goal
  let pos;
  let tries = 0;
  do {
    pos = new THREE.Vector3(
      (Math.random() - 0.5) * (CUBE - 1.8),
      (Math.random() - 0.5) * (CUBE - 1.8),
      (Math.random() - 0.5) * (CUBE - 1.8)
    );
    tries++;
  } while ((pos.distanceTo(START) < 2.5 || pos.distanceTo(GOAL) < 2.5) && tries < 50);

  mesh.position.copy(pos);
  scene.add(mesh);

  // Random velocity
  const speed = 0.012 + Math.random() * 0.02;
  const vel = new THREE.Vector3(
    Math.random() - 0.5,
    Math.random() - 0.5,
    Math.random() - 0.5
  ).normalize().multiplyScalar(speed);

  obstacles.push({ mesh, vel, radius: rad });
}

// ═══════════════════════════════════════════════════
//  TRAIL
// ═══════════════════════════════════════════════════
const MAX_TRAIL = 600;
const trailPoints = [];
let trailGeo = new THREE.BufferGeometry();
const trailLine = new THREE.Line(
  trailGeo,
  new THREE.LineBasicMaterial({ color: 0x33aaff, transparent: true, opacity: 0.75 })
);
scene.add(trailLine);

// ═══════════════════════════════════════════════════
//  APF PARAMETERS
// ═══════════════════════════════════════════════════
const APF = {
  K_ATT:  2.5,    // attractive gain
  D_STAR: 2.8,    // attractive saturation radius
  K_REP:  40.0,   // repulsive gain
  D0:     3.8,    // obstacle influence radius
  K_WALL: 14.0,   // wall repulsion gain
  D_WALL: 2.2,    // wall influence radius
  DT:     0.012,  // timestep
  DAMP:   0.75,   // velocity damping
  VMAX:   0.18,   // max speed
};

// ═══════════════════════════════════════════════════
//  SIMULATION STATE
// ═══════════════════════════════════════════════════
let vel      = new THREE.Vector3();
let running  = false;
let reached  = false;
let pathLen  = 0;
let prevPos  = START.clone();
let stuckCtr = 0;
let frame    = 0;

// For APF info
let lastFatt = 0, lastFrep = 0, lastFnet = 0;

function computeAPF(pos) {
  const F = new THREE.Vector3();

  // — Attractive —
  const toGoal = GOAL.clone().sub(pos);
  const dGoal = toGoal.length();
  const Fatt = dGoal < APF.D_STAR
    ? toGoal.clone().multiplyScalar(APF.K_ATT)
    : toGoal.clone().normalize().multiplyScalar(APF.K_ATT * APF.D_STAR);

  lastFatt = Fatt.length();
  F.add(Fatt);

  // — Repulsive (obstacles) —
  const Frep = new THREE.Vector3();
  for (const obs of obstacles) {
    const toObs = pos.clone().sub(obs.mesh.position);
    const raw = toObs.length();
    const d = Math.max(raw - obs.radius, 0.05);
    if (d < APF.D0) {
      const mag = APF.K_REP * (1/d - 1/APF.D0) / (d * d);
      Frep.add(toObs.clone().normalize().multiplyScalar(mag));
    }
  }
  lastFrep = Frep.length();
  F.add(Frep);

  // — Wall repulsion —
  const bound = HALF - 0.25;
  for (const ax of ['x','y','z']) {
    const p = pos[ax];
    const dPos = bound - p;
    if (dPos < APF.D_WALL && dPos > 0.001) {
      F[ax] -= APF.K_WALL * (1/dPos - 1/APF.D_WALL) / (dPos*dPos);
    }
    const dNeg = p + bound;
    if (dNeg < APF.D_WALL && dNeg > 0.001) {
      F[ax] += APF.K_WALL * (1/dNeg - 1/APF.D_WALL) / (dNeg*dNeg);
    }
  }

  lastFnet = F.length();
  return F;
}

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  frame++;

  // — Spin goal rings —
  ringGeos.forEach((r, i) => {
    const t = frame * 0.012 + i * Math.PI * 0.6;
    r.scale.setScalar(1 + Math.sin(t) * 0.12);
    r.material.opacity = 0.25 + Math.sin(t) * 0.2;
    r.rotation.x += 0.012 * (i + 1);
    r.rotation.y += 0.008 * (i + 1);
  });

  // — Move obstacles —
  for (const obs of obstacles) {
    obs.mesh.position.add(obs.vel);
    obs.mesh.rotation.x += 0.008;
    obs.mesh.rotation.y += 0.013;
    for (const ax of ['x','y','z']) {
      const b = HALF - obs.radius;
      if (obs.mesh.position[ax] > b) { obs.vel[ax] *= -1; obs.mesh.position[ax] = b; }
      if (obs.mesh.position[ax] < -b) { obs.vel[ax] *= -1; obs.mesh.position[ax] = -b; }
    }
  }

  // — Drone simulation —
  if (running && !reached) {
    const pos = droneGroup.position;

    const force = computeAPF(pos);

    // Anti-stuck jitter
    if (vel.length() < 0.004) {
      stuckCtr++;
      if (stuckCtr > 40) {
        force.add(new THREE.Vector3(
          (Math.random()-0.5) * 0.8,
          (Math.random()-0.5) * 0.8,
          (Math.random()-0.5) * 0.8
        ));
        stuckCtr = 0;
      }
    } else { stuckCtr = 0; }

    // Integrate
    vel.addScaledVector(force, APF.DT);
    vel.multiplyScalar(APF.DAMP);
    vel.clampLength(0, APF.VMAX);

    pos.add(vel);
    pos.clampScalar(-HALF + 0.18, HALF - 0.18);

    // Collision push-out
    for (const obs of obstacles) {
      const diff = pos.clone().sub(obs.mesh.position);
      const minDist = obs.radius + 0.28;
      if (diff.length() < minDist) {
        pos.copy(obs.mesh.position).addScaledVector(diff.normalize(), minDist);
        vel.reflect(diff.normalize()).multiplyScalar(0.3);
      }
    }

    // Trail
    pathLen += pos.distanceTo(prevPos);
    prevPos.copy(pos.clone());
    trailPoints.push(pos.clone());
    if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
    if (trailPoints.length >= 2) trailGeo.setFromPoints(trailPoints);

    // Drone tilt (banking effect)
    const tX = -vel.z * 4.5;
    const tZ = vel.x * 4.5;
    droneGroup.rotation.x += (tX - droneGroup.rotation.x) * 0.12;
    droneGroup.rotation.z += (tZ - droneGroup.rotation.z) * 0.12;
    if (vel.lengthSq() > 0.0001) {
      const yaw = Math.atan2(vel.x, vel.z);
      droneGroup.rotation.y += (yaw - droneGroup.rotation.y) * 0.08;
    }

    // Check goal
    if (pos.distanceTo(GOAL) < 0.55) {
      reached = true;
      running = false;
      onGoalReached();
    }

    // Update UI stats
    const nearest = obstacles.reduce((best, o) => {
      const d = pos.distanceTo(o.mesh.position) - o.radius;
      return d < best ? d : best;
    }, Infinity);

    document.getElementById('sPos').textContent =
      `${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)}`;
    document.getElementById('sVel').textContent =
      (vel.length() * 100).toFixed(1) + ' u/s';
    document.getElementById('sPath').textContent = pathLen.toFixed(2);
    document.getElementById('sObs').textContent =
      nearest.toFixed(2) + ' u';
    document.getElementById('sDist').textContent =
      pos.distanceTo(GOAL).toFixed(2) + ' u';

    const maxF = 8;
    document.getElementById('fAtt').textContent = lastFatt.toFixed(2);
    document.getElementById('bAtt').style.width = Math.min(lastFatt/maxF*100, 100) + '%';
    document.getElementById('fRep').textContent = lastFrep.toFixed(2);
    document.getElementById('bRep').style.width = Math.min(lastFrep/maxF*100, 100) + '%';
    document.getElementById('fNet').textContent = lastFnet.toFixed(2);
    document.getElementById('bNet').style.width = Math.min(lastFnet/maxF*100, 100) + '%';
  }

  // Spin rotors
  const spinSpeed = running ? 0.28 : 0.06;
  for (const r of rotorMeshes) r.mesh.rotation.y += spinSpeed * r.dir;

  // Pulse start marker
  const sp = 1 + Math.sin(frame * 0.06) * 0.08;
  startMarker.scale.setScalar(sp);

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════
//  GOAL REACHED
// ═══════════════════════════════════════════════════
function onGoalReached() {
  document.getElementById('sStatus').textContent = 'MISSION COMPLETE';
  document.getElementById('sStatus').style.color = '#4f8';
  document.getElementById('btnStart').textContent = '✓ Done';
  document.getElementById('btnStart').disabled = true;
  document.getElementById('goal-overlay').classList.add('visible');
  // Remove overlay after 4s
  setTimeout(() => {
    document.getElementById('goal-overlay').classList.remove('visible');
  }, 5000);
}

// ═══════════════════════════════════════════════════
//  CAMERA CONTROLS
// ═══════════════════════════════════════════════════
let dragging = false, lastM = {x:0,y:0};

canvas.addEventListener('mousedown', e => { dragging = true; lastM = {x:e.clientX,y:e.clientY}; });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  camState.theta -= (e.clientX - lastM.x) * 0.007;
  camState.phi = Math.max(0.06, Math.min(Math.PI - 0.06, camState.phi - (e.clientY - lastM.y) * 0.007));
  lastM = {x:e.clientX,y:e.clientY};
  updateCamera();
});
canvas.addEventListener('wheel', e => {
  camState.r = Math.max(7, Math.min(55, camState.r + e.deltaY * 0.025));
  updateCamera();
  e.preventDefault();
}, { passive: false });

// Touch
let lastTouch = null;
canvas.addEventListener('touchstart', e => { lastTouch = e.touches[0]; });
canvas.addEventListener('touchmove', e => {
  if (!lastTouch) return;
  const t = e.touches[0];
  camState.theta -= (t.clientX - lastTouch.clientX) * 0.007;
  camState.phi = Math.max(0.06, Math.min(Math.PI-0.06, camState.phi - (t.clientY - lastTouch.clientY) * 0.007));
  lastTouch = t;
  updateCamera();
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => lastTouch = null);

// ═══════════════════════════════════════════════════
//  BUTTONS
// ═══════════════════════════════════════════════════
const btnStart = document.getElementById('btnStart');
const btnReset = document.getElementById('btnReset');

btnStart.addEventListener('click', () => {
  if (reached) return;
  running = !running;
  if (running) {
    btnStart.textContent = '⏸ Pause';
    btnStart.classList.add('active');
    document.getElementById('sStatus').textContent = 'NAVIGATING';
    document.getElementById('sStatus').style.color = '#fa4';
  } else {
    btnStart.textContent = '▶ Resume';
    btnStart.classList.remove('active');
    document.getElementById('sStatus').textContent = 'PAUSED';
    document.getElementById('sStatus').style.color = '#88a';
  }
});

btnReset.addEventListener('click', () => {
  running = false;
  reached = false;
  vel.set(0, 0, 0);
  droneGroup.position.copy(START);
  droneGroup.rotation.set(0, 0, 0);
  trailPoints.length = 0;
  trailGeo = new THREE.BufferGeometry();
  trailLine.geometry = trailGeo;
  pathLen = 0;
  prevPos.copy(START);
  stuckCtr = 0;
  lastFatt = lastFrep = lastFnet = 0;

  btnStart.textContent = '▶ Launch';
  btnStart.classList.remove('active');
  btnStart.disabled = false;
  document.getElementById('sStatus').textContent = 'STANDBY';
  document.getElementById('sStatus').style.color = '#3af';
  document.getElementById('sPos').textContent = '—';
  document.getElementById('sVel').textContent = '—';
  document.getElementById('sPath').textContent = '0.00';
  document.getElementById('sObs').textContent = '—';
  document.getElementById('sDist').textContent = '—';
  document.getElementById('bAtt').style.width = '0%';
  document.getElementById('bRep').style.width = '0%';
  document.getElementById('bNet').style.width = '0%';
  document.getElementById('fAtt').textContent = '0.00';
  document.getElementById('fRep').textContent = '0.00';
  document.getElementById('fNet').textContent = '0.00';
  document.getElementById('goal-overlay').classList.remove('visible');
});

// ═══════════════════════════════════════════════════
//  KICK OFF
// ═══════════════════════════════════════════════════
animate();
</script>
